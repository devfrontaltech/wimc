<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkSpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- SIDEBAR (desktop) / BOTTOM SHEET (mobile) -->
  <aside class="panel" id="panel">
    <div class="panel-header">
      <div class="brand-small">
        <span>🅿</span>
        <span class="brand-small-name">ParkSpot</span>
      </div>
      <button class="btn-icon" id="logout-btn" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <!-- Street search — inside the panel -->
    <div class="panel-search" id="panel-search-wrap">
      <div class="panel-search-wrap">
        <span class="panel-search-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="text"
          id="search-input"
          class="panel-search-input"
          placeholder="Buscar calle o lugar..."
          autocomplete="off"
        />
      </div>
      <div class="panel-search-results hidden" id="search-results"></div>
    </div>

    <div class="panel-section">
      <div class="section-label">Mis coches</div>
      <div id="cars-list" class="cars-list"></div>
      <button class="btn-add-car" id="add-car-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Añadir coche
      </button>
    </div>

    <div class="panel-section" id="parking-section">
      <div class="section-label">Aparcamiento actual</div>
      <div id="parking-info" class="parking-info">
        <p class="parking-empty">Selecciona un coche para ver dónde está aparcado.</p>
      </div>
    </div>

    <div class="panel-footer">
      <button class="btn-save-parking" id="save-gps-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        Aparcar aquí (GPS)
      </button>
    </div>
  </aside>

  <!-- PANEL TOGGLE — lateral tab on desktop, pill on mobile -->
  <button class="panel-toggle" id="panel-toggle" title="Mostrar/ocultar panel">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <!-- MAP -->
  <main class="map-container" id="map-container">
    <div id="map"></div>


    <div class="map-hint hidden" id="map-hint">
      Pulsa en el mapa para aparcar el coche seleccionado
    </div>
  </main>

  <!-- MODAL: Añadir / editar coche -->
  <div class="modal-overlay hidden" id="car-modal-overlay">
    <div class="modal" id="car-modal">
      <div class="modal-header">
        <h2 id="modal-title">Añadir coche</h2>
        <button class="btn-icon" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="field">
        <label for="car-name-input">Nombre del coche</label>
        <input type="text" id="car-name-input" placeholder="Ej: Seat Ibiza, El rojo..." maxlength="30" />
      </div>
      <div class="field">
        <label>Color en el mapa</label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <div id="modal-error" class="error-msg hidden"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-delete-btn" style="display:none">Eliminar coche</button>
        <button class="btn-primary" id="modal-save-btn">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirmar aparcamiento -->
  <div class="modal-overlay hidden" id="confirm-modal-overlay">
    <div class="modal" id="confirm-modal">
      <div class="modal-header">
        <h2>Confirmar aparcamiento</h2>
        <button class="btn-icon" id="confirm-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p id="confirm-modal-text">¿Aparcar <strong id="confirm-car-name"></strong> en este punto?</p>
      <div id="confirm-address" class="confirm-address">Obteniendo dirección...</div>
      <div class="modal-actions">
        <button class="btn-secondary" id="confirm-cancel-btn">Cancelar</button>
        <button class="btn-primary" id="confirm-save-btn">Guardar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirmar cierre de sesión -->
  <div class="modal-overlay hidden" id="logout-modal-overlay">
    <div class="modal" id="logout-modal">
      <div class="modal-header">
        <h2>Cerrar sesión</h2>
        <button class="btn-icon" id="logout-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p>¿Seguro que quieres cerrar sesión?</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="logout-cancel-btn">Cancelar</button>
        <button class="btn-primary" id="logout-confirm-btn">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
