<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkSpot — Dónde dejé el coche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">🅿</span>
        <h1 class="brand-name">ParkSpot</h1>
        <p class="brand-tagline">Nunca más te preguntarás dónde aparcaste.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="register">Registrarse</button>
      </div>

      <form id="auth-form" novalidate>
        <div id="register-name-field" class="field hidden">
          <label for="display-name">Nombre</label>
          <input type="text" id="display-name" placeholder="Tu nombre" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div id="error-msg" class="error-msg hidden"></div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
